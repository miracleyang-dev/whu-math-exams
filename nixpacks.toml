# Railway / Nixpacks build config
# 关键：把 Git LFS 指针在 build 阶段换成真实 PDF，否则 Caddy 会用 application/pdf
# 的头返回 131 字节的指针文本，浏览器 iframe 解析失败、预览空白。

[phases.setup]
nixPkgs = ["git", "git-lfs", "caddy"]

[phases.install]
cmds = [
  "git lfs install --local",
  "git lfs pull"
]

[start]
cmd = "caddy run --config Caddyfile --adapter caddyfile"
